<div class="booking-container">
    <div class="booking-hero-image">
        <div class="hero-overlay">
            <h2>Réserver un séjour</h2>
            <p>Planifiez votre visite dès maintenant</p>
        </div>
    </div>

    <form action="#" method="POST" class="hotel-booking-form">
        
        <div class="form-section">
            <div class="form-row">
                <div class="form-group">
                    <label for="first-name">Prénom</label>
                    <input type="text" id="first-name" name="first-name" required>
                </div>
                <div class="form-group">
                    <label for="last-name">Nom</label>
                    <input type="text" id="last-name" name="last-name" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">Adresse E-mail</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Téléphone</label>
                    <input type="tel" id="phone" name="phone" placeholder="+226 6 00 00 00 00" required>
                </div>
            </div>
        </div>

        <hr class="form-divider">

        <div class="form-section">
            <div class="form-row">
                <div class="form-group">
                    <label for="checkin">Date d'arrivée</label>
                    <input type="date" id="checkin" name="checkin" required>
                </div>
                <div class="form-group">
                    <label for="checkout">Date de départ</label>
                    <input type="date" id="checkout" name="checkout" required>
                </div>
            </div>

            <div class="form-group">
                <label for="room-type">Type de chambre</label>
                <select id="room-type" name="room-type" required>
                    <option value="" disabled selected>Sélectionnez une option</option>
                    <option value="standard">Chambre Standard</option>
                    <option value="suite">Suite Royale</option>
                    <option value="family">Chambre Familiale</option>
                </select>
            </div>
        </div>

        <hr class="form-divider">

        <div class="form-section">
            <div class="form-group">
                <label for="requests">Demandes particulières / Remarques</label>
                <textarea id="requests" name="requests" rows="4" placeholder="Ex: Lit bébé, allergies, arrivée tardive..."></textarea>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-submit">Confirmer la réservation</button>
        </div>
    </form>
</div>
